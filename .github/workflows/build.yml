name: Build Executables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            exe_name: GhostTrackerPro_Linux
            ext: ''
          - os: windows-latest
            exe_name: GhostTrackerPro_Windows
            ext: .exe
          - os: macos-latest
            exe_name: GhostTrackerPro_macOS
            ext: ''

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller

      - name: Build executable
        run: |
          python -m PyInstaller --clean --noconfirm ^
            --name ${{ matrix.exe_name }} ^
            --onefile ^
            --paths src ^
            --add-data "src/ghosttrackerpro/web/static:ghosttrackerpro/web/static" ^
            --add-data "src/ghosttrackerpro/web/templates:ghosttrackerpro/web/templates" ^
            --hidden-import ghosttrackerpro ^
            --hidden-import ghosttrackerpro.core ^
            --hidden-import ghosttrackerpro.cli ^
            --hidden-import ghosttrackerpro.app ^
            --hidden-import requests ^
            --hidden-import phonenumbers ^
            --hidden-import phonenumbers.carrier ^
            --hidden-import phonenumbers.geocoder ^
            --hidden-import phonenumbers.timezone ^
            --hidden-import flask ^
            --hidden-import concurrent.futures ^
            --exclude-module tkinter ^
            --exclude-module test ^
            --exclude-module unittest ^
            GhostTrackerPro.py
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.exe_name }}
          path: dist/${{ matrix.exe_name }}${{ matrix.ext }}

  create_release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/GhostTrackerPro_Linux/GhostTrackerPro_Linux
            artifacts/GhostTrackerPro_Windows/GhostTrackerPro_Windows.exe
            artifacts/GhostTrackerPro_macOS/GhostTrackerPro_macOS
          generate_release_notes: true
