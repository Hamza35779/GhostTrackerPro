name: Build Executables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            exe_name: GhostTrackerPro_Linux
            ext: ''
          - os: windows-latest
            exe_name: GhostTrackerPro_Windows
            ext: .exe
          - os: macos-latest
            exe_name: GhostTrackerPro_macOS
            ext: ''

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller pillow

      - name: Build executable
        run: |
          python -m PyInstaller GhostTrackerPro.spec
          # Rename output to match matrix name
          if [ -f dist/GhostTrackerPro.exe ]; then
            mv dist/GhostTrackerPro.exe dist/${{ matrix.exe_name }}${{ matrix.ext }}
          elif [ -f dist/GhostTrackerPro ]; then
            mv dist/GhostTrackerPro dist/${{ matrix.exe_name }}${{ matrix.ext }}
          fi
        shell: bash

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.exe_name }}
          path: dist/${{ matrix.exe_name }}${{ matrix.ext }}

  build_wheel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build wheel
        run: |
          pip install build
          python -m build
      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: ghosttrackerpro-wheel
          path: dist/*.whl

  create_release:
    needs: [build, build_wheel]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/GhostTrackerPro_Linux/GhostTrackerPro_Linux
            artifacts/GhostTrackerPro_Windows/GhostTrackerPro_Windows.exe
            artifacts/GhostTrackerPro_macOS/GhostTrackerPro_macOS
            artifacts/ghosttrackerpro-wheel/*.whl
          generate_release_notes: true
